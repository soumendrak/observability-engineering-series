# docker-compose.yml — Chapter 9: Sampling & PII Scrubbing
#
# Builds on Chapter 8. Uses pinned image versions.
# The Collector config now includes tail_sampling and transform processors.

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    command: ["--config", "/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"    # OTLP gRPC (your apps send here)
      - "4318:4318"    # OTLP HTTP
      - "8889:8889"    # Prometheus scrape endpoint (app metrics)
      - "8888:8888"    # Collector internal metrics
      - "13133:13133"  # Health check endpoint
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 5s
      timeout: 3s
      retries: 3
    depends_on:
      jaeger:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    ports:
      - "16686:16686"  # Jaeger UI

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      otel-collector:
        condition: service_healthy
