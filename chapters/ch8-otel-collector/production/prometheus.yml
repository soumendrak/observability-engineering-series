# prometheus.yml — Production-ready (Chapter 8 Part 3)
#
# Scrapes two endpoints from the OTel Collector:
#   • :8889 — your application metrics (forwarded by the Collector)
#   • :8888 — the Collector's own internal metrics (self-observability)

global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: "otel-collector-internal"
    static_configs:
      - targets: ["otel-collector:8888"]
