# datasources.yaml — Chapter 10: Dashboards & the RED Method
#
# Auto-provisions Prometheus and Jaeger data sources in Grafana.
# No manual UI configuration needed — just docker compose up.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: true
