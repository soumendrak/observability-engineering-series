# prometheus.yml — Chapter 10: Dashboards & the RED Method
#
# Identical to Chapter 9: scrapes two endpoints from the OTel Collector.
#   • :8889 — your application metrics (forwarded by the Collector)
#   • :8888 — the Collector's own internal metrics (self-observability)

global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: "otel-collector-internal"
    static_configs:
      - targets: ["otel-collector:8888"]
